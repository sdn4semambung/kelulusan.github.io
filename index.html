<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman Kelulusan SD Negeri 4 Semambung</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#0f4c81,#2e86de);
}

.container{
    width:100%;
    max-width:650px;
    background:#ffffff;
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.school{
    color:#0f4c81;
    font-size:14px;
    font-weight:600;
    margin-bottom:10px;
}

h1{
    color:#0f4c81;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #dcdcdc;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#0f4c81;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0f4c81;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#093152;
}

.result{
    display:none;
    margin-top:25px;
    padding:25px;
    border-radius:15px;
}

.lulus{
    background:#eefbf0;
    border:1px solid #7bd67f;
}

.error{
    background:#fff0f0;
    border:1px solid #ff9e9e;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.show{
    animation:muncul .8s ease;
}

.icon{
    font-size:70px;
    margin-bottom:10px;
}

.nama{
    font-size:24px;
    font-weight:700;
    color:#0f4c81;
    margin:10px 0;
}

.status{
    color:#0d8f2d;
    font-size:30px;
    font-weight:700;
    margin-top:10px;
}

.download-btn{
    display:inline-block;
    margin-top:20px;
    padding:14px 22px;
    border-radius:12px;
    background:#28a745;
    color:white;
    text-decoration:none;
    font-weight:600;
}

.download-btn:hover{
    background:#1f8637;
}

.loading{
    color:#555;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#888;
}

@media(max-width:600px){

    .container{
        padding:25px;
    }

    h1{
        font-size:24px;
    }

    .nama{
        font-size:20px;
    }

    .status{
        font-size:24px;
    }
}

</style>

</head>
<body>

<div class="container">
<div class="school">
    SD NEGERI 4 SEMAMBUNG
</div>
<h1>Pengumuman Kelulusan</h1>
<p class="subtitle">
    Siswa Kelas VI
</p>
<input
    type="text"
    id="nisn"
    placeholder="Masukkan NISN">

<button onclick="cekKelulusan()">
    CEK KELULUSAN
</button>

<div id="hasil" class="result"></div>

<div class="footer">
    © SD Negeri 4 Semambung
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzTeHIc6YiuPouyKd5d5p7e5TzCMvdBdObl5BPEdMRKETuKH7y5nzcSrEjlWcGkQ2TGIg/exec";

/*
GANTI DENGAN LINK PDF SURAT KELULUSAN
*/
const SURAT_URL =
"https://drive.google.com/drive/folders/1SDcqebx04FxBnQdOEVcs9IsJymQIbxq3?usp=sharing";

async function cekKelulusan(){

    const nisn =
        document.getElementById("nisn")
        .value
        .trim();

    const hasil =
        document.getElementById("hasil");

    if(!nisn){

        hasil.style.display="block";
        hasil.className="result error show";

        hasil.innerHTML=
        "<b>Silakan masukkan NISN terlebih dahulu.</b>";

        return;
    }

    hasil.style.display="block";
    hasil.className="result show";

    hasil.innerHTML=
    "<div class='loading'>Memuat data...</div>";

    try{

        const response =
            await fetch(API_URL);

        const data =
            await response.json();

        const siswa =
            data.find(
                s => String(s.nisn).trim() === nisn
            );

        if(siswa){

            hasil.className =
            "result lulus show";

            hasil.innerHTML = `
                <div class="icon">🎓</div>

                <h2>SELAMAT</h2>

                <div class="nama">
                    ${siswa.nama}
                </div>

                <p>
                    NISN : ${siswa.nisn}
                </p>

                <div class="status">
                    ${siswa.keterangan}
                </div>

                <p style="margin-top:15px">
                    Berdasarkan hasil rapat dewan guru,
                    Anda dinyatakan lulus.
                </p>

                <a
                    href="${SURAT_URL}"
                    target="_blank"
                    class="download-btn">
                    📄 Download Surat Kelulusan
                </a>
            `;

            confetti({
                particleCount:150,
                spread:120,
                origin:{y:0.6}
            });

        }else{

            hasil.className =
            "result error show";

            hasil.innerHTML = `
                <h3>Data Tidak Ditemukan</h3>
                <p>
                    NISN yang Anda masukkan tidak terdaftar.
                </p>
            `;
        }

    }catch(error){

        hasil.className =
        "result error show";

        hasil.innerHTML = `
            <h3>Terjadi Kesalahan</h3>
            <p>
                Gagal mengambil data dari server.
            </p>
        `;
    }
}

</script>

</body>
</html>
